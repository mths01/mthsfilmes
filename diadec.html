<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Álbum DIADEC 2026 | Matheus Films</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="assets/css/inner.css" />
  
  <style>
    .photo-gallery-section {
      padding-top: 40px; 
    }

    .photo-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
      gap: 16px; 
      padding: 0 52px 80px; 
      max-width: 1400px; 
      margin: 0 auto; 
    }
    
    .photo-item { 
      aspect-ratio: 3/2; 
      overflow: hidden; 
      border-radius: 8px; 
      cursor: pointer; 
      background: #1a1a1a;
      border: 2px solid transparent;
      transition: all 0.3s ease; 
      /* OTIMIZAÇÃO DE RENDERIZAÇÃO: Pula o processamento se estiver fora da tela */
      content-visibility: auto;
      contain-intrinsic-size: 300px 200px;
    }
    
    .photo-item img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      transition: transform 0.6s ease; 
    }
    
    .photo-item:hover {
      border-color: #e5b63a;
      box-shadow: 0 0 20px rgba(229, 182, 58, 0.4);
      transform: translateY(-5px);
      z-index: 2;
    }
    .photo-item:hover img { transform: scale(1.05); }

    .hero-btn-back { 
      display: inline-block; 
      margin-top: 25px; 
      color: #aaa; 
      text-decoration: none; 
      font-size: 11px; 
      text-transform: uppercase; 
      letter-spacing: 2px; 
      transition: color 0.3s; 
      font-family: 'Inter', sans-serif;
    }
    .hero-btn-back:hover { color: #e5b63a; }

    .lightbox {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(8px);
      align-items: center; justify-content: center; opacity: 0;
      transition: opacity 0.3s ease;
    }
    .lightbox.open { display: flex; opacity: 1; }
    .lightbox-img { max-width: 90vw; max-height: 90vh; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .lightbox-close { position: absolute; top: 30px; right: 40px; font-size: 40px; color: #fff; cursor: pointer; background: none; border: none; transition: color 0.3s ease; }
    .lightbox-close:hover { color: #e5b63a; }

    @media (max-width: 768px) {
      .photo-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); padding: 0 24px 60px; }
    }
  </style>
</head>
<body class="inner-page">

  <nav class="navbar">
    <a href="index.html" class="nav-logo">MTHSFILMS</a>
    <ul class="nav-links">
      <li><a href="index.html">INÍCIO</a></li>
      <li><a href="videos.html">VÍDEOS</a></li>
      <li><a href="fotografia.html" class="active">FOTOS</a></li>
    </ul>
  </nav>

  <header class="inner-hero" style="min-height: 40vh;">
    <div class="inner-hero-bg">
      <img src="assets/images/image32.jpeg" alt="Capa" />
      <div class="inner-hero-overlay"></div>
    </div>
    <div class="inner-hero-content">
      <h1 class="inner-title">DIADEC 2026</h1>
      <p class="inner-subtitle">Cobertura especial do evento.</p>
      
      <a href="fotografia.html" class="hero-btn-back">← VOLTAR PARA COLEÇÕES</a>
    </div>
  </header>

  <section class="photo-gallery-section">
    <div class="photo-grid" id="galeria-fotos"></div>
  </section>

  <div class="footer-gradient" style="height: 150px; background: linear-gradient(to bottom, transparent, #000);"></div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="close">&times;</button>
    <img class="lightbox-img" id="img-foco" src="" alt="Preview">
  </div>

  <script src="assets/js/inner.js"></script>
  <script>
    const galleryGrid = document.getElementById('galeria-fotos');
    const galleryLightbox = document.getElementById('lightbox');
    const galleryImgFoco = document.getElementById('img-foco');
    const galleryCloseBtn = document.getElementById('close');

    // Usando DocumentFragment para injetar as 43 fotos de uma vez só (muito mais rápido)
    const fragment = document.createDocumentFragment();

    for (let i = 1; i <= 43; i++) {
      const div = document.createElement('div');
      div.className = 'photo-item';
      
      // Ajustado para o nome exato dos seus novos arquivos: photo (1).JPG
      div.innerHTML = `<img 
        src="assets/images/diadec/photo (${i}).JPG" 
        alt="Foto ${i}" 
        loading="lazy" 
        decoding="async"
        onerror="this.parentElement.style.display='none';"
      >`;

      div.onclick = function() {
        const img = this.querySelector('img');
        if(img && img.src) {
          galleryImgFoco.src = img.src;
          galleryLightbox.classList.add('open');
        }
      };

      fragment.appendChild(div);
    }
    
    // Insere tudo no grid de uma única vez
    galleryGrid.appendChild(fragment);

    galleryCloseBtn.onclick = function() {
      galleryLightbox.classList.remove('open');
      setTimeout(() => { galleryImgFoco.src = ""; }, 300);
    };

    galleryLightbox.onclick = function(e) {
      if (e.target === galleryLightbox) {
        galleryLightbox.classList.remove('open');
        setTimeout(() => { galleryImgFoco.src = ""; }, 300);
      }
    };
  </script>
</body>
</html>
